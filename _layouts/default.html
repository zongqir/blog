<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title and page.title != site.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    {% seo %}
    <script>
      (function () {
        var host = window.location.hostname.toLowerCase();
        var path = window.location.pathname || "/";
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        var targetHost = "blog.zongqir.com";

        // Keep a single canonical host to avoid broken paths on legacy URLs.
        if (host === "zongqir.github.io") {
          if (path === "/blog") {
            path = "/";
          } else if (path.indexOf("/blog/") === 0) {
            path = path.slice(5) || "/";
          }
          window.location.replace("https://" + targetHost + path + search + hash);
        } else if (host === "zongqir.com" || host === "www.zongqir.com") {
          window.location.replace("https://" + targetHost + path + search + hash);
        }
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  </head>
  <body class="{% if page.layout %}layout-{{ page.layout }}{% endif %}{% if page.url == '/' %} is-home{% endif %}{% if page.url == '/archive/' %} is-archive{% endif %}{% if page.url == '/tags/' %} is-tags{% endif %}{% if page.url == '/about/' %} is-about{% endif %}">
    <div class="site-atmosphere" aria-hidden="true">
      <span class="atmosphere-orb atmosphere-orb-left"></span>
      <span class="atmosphere-orb atmosphere-orb-right"></span>
      <span class="atmosphere-grid"></span>
    </div>

    <header class="site-header">
      <div class="container site-header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand-mark">{{ site.title }}</span>
          <span class="brand-title">复杂系统与工程判断</span>
        </a>
        <nav class="main-nav">
          <a class="{% if page.url == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">首页</a>
          <a class="{% if page.url == '/archive/' %}active{% endif %}" href="{{ '/archive/' | relative_url }}">归档</a>
          <a class="{% if page.url == '/tags/' %}active{% endif %}" href="{{ '/tags/' | relative_url }}">标签</a>
          <a class="{% if page.url == '/about/' %}active{% endif %}" href="{{ '/about/' | relative_url }}">关于</a>
        </nav>
      </div>
    </header>

    <main class="container content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container site-footer-inner">
        <p class="site-footer-title">持续记录那些真正影响结果的工程取舍。</p>
        <small>&copy; {{ 'now' | date: '%Y' }} {{ site.title }} · 基于 Jekyll 发布</small>
      </div>
    </footer>

    <script src="{{ '/assets/js/post-experience.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/sort-posts.js' | relative_url }}"></script>
  </body>
</html>
